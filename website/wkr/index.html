<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WKR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="wkr.css">
  <link rel="icon" href="../logo300_red.png">
  <style>
    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      flex: 1;
      padding: 2rem;
    }

    .landing-title {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .landing-cards {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    a.landing-card {
      display: flex;
      flex-direction: column;
      gap: .5rem;
      width: 220px;
      padding: 1.75rem 1.5rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      transition: box-shadow .15s, transform .12s;
      border-left: 4px solid transparent;
    }

    a.landing-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      transform: translateY(-2px);
    }

    a.landing-card.start { border-left-color: var(--accent); }
    a.landing-card.ziel  { border-left-color: var(--warning); }

    .card-label {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .card-desc {
      font-size: .82rem;
      color: var(--text-soft);
      line-height: 1.45;
    }
  </style>
</head>
<body>
<div class="app">

  <nav class="toolbar">
    <span class="toolbar-title">Wettkampfrichter</span>
    <span class="spacer"></span>
    <span class="sync-dot" id="sync-dot"></span>
    <span class="sync-label" id="sync-label">–</span>
  </nav>

  <div class="landing">
    <p class="landing-title">Ansicht wählen</p>
    <div class="landing-cards">
      <a class="landing-card start" href="start/">
        <span class="card-label">Start</span>
        <span class="card-desc">Nächstes und übernächstes ungeplantes Rennen</span>
      </a>
      <a class="landing-card ziel" href="ziel/">
        <span class="card-label">Ziel</span>
        <span class="card-desc">Letztes gestartetes und nächstes ungeplantes Rennen</span>
      </a>
    </div>
  </div>

</div>
<script>
  async function loadSync() {
    try {
      const res = await fetch('../data/status.json?t=' + Date.now());
      if (!res.ok) return;
      const status = await res.json();
      const dot   = document.getElementById('sync-dot');
      const label = document.getElementById('sync-label');
      const ts    = status.timestamp;
      const mins  = ts ? Math.floor((Date.now() - new Date(ts).getTime()) / 60_000) : null;
      dot.className    = 'sync-dot' + (mins === null || mins > 3 ? ' stale' : '');
      label.textContent = mins === null ? '–' : mins === 0 ? 'gerade eben' : `vor ${mins} min`;
    } catch {}
  }
  loadSync();
  setInterval(loadSync, 30_000);
</script>
</body>
</html>
