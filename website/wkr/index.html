<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WKR — Regatta</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #1a2236;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    .title {
      font-size: 1rem;
      font-weight: 500;
      color: rgba(255,255,255,.4);
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .cards {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .75rem;
      width: 200px;
      padding: 2rem 1.5rem;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      text-decoration: none;
      color: #fff;
      transition: background .15s, transform .12s;
    }

    a.card:hover {
      background: rgba(255,255,255,.13);
      transform: translateY(-2px);
    }

    .card-icon { font-size: 2.5rem; }
    .card-label { font-size: 1.25rem; font-weight: 700; }
    .card-desc {
      font-size: .8rem;
      color: rgba(255,255,255,.45);
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <p class="title">Wettkampfrichter</p>
  <div class="cards">
    <a class="card" href="start/">
      <span class="card-icon">🚣</span>
      <span class="card-label">Start</span>
      <span class="card-desc">Nächstes und übernächstes ungeplantes Rennen</span>
    </a>
    <a class="card" href="ziel/">
      <span class="card-icon">🏁</span>
      <span class="card-label">Ziel</span>
      <span class="card-desc">Letztes gestartetes und nächstes ungeplantes Rennen</span>
    </a>
  </div>
</body>
</html>
